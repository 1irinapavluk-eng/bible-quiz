<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Біблійна вікторина</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9912A;--gold-light:#F2D88A;--gold-pale:#FDF6E3;
  --dark:#1A1108;--dark2:#2E1F0A;--brown:#6B3F10;
  --parchment:#F7EDD6;--parchment2:#EFE0BE;
  --green-ok:#3A7D44;--green-pale:#E8F5EB;
  --sel-bg:#E6F1FB;--sel-border:#185FA5;--sel-text:#0D2D5C;
  --shadow:0 2px 12px rgba(60,30,0,.12);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{
  font-family:'Nunito',sans-serif;color:var(--dark);
  background:var(--parchment);
  background-image:radial-gradient(ellipse at 20% 0%,rgba(201,145,42,.12) 0%,transparent 55%);
  min-height:100vh;padding-bottom:env(safe-area-inset-bottom);
}
.screen{display:none;padding:16px 14px 32px;max-width:480px;margin:0 auto;}
.screen.active{display:block;}

/* WELCOME */
.welcome-header{text-align:center;padding:28px 0 20px;}
.welcome-icon{font-size:3rem;margin-bottom:8px;}
.welcome-title{font-family:'Crimson Pro',serif;font-size:1.9rem;font-weight:600;color:var(--dark2);line-height:1.2;}
.welcome-title span{color:var(--gold);}
.welcome-sub{font-size:.88rem;color:var(--brown);margin-top:6px;font-style:italic;}
.divider{height:1.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px 0;border:none;}
.name-card{background:white;border-radius:var(--radius);padding:18px;border:1px solid var(--parchment2);box-shadow:var(--shadow);margin-bottom:14px;}
.field-label{font-size:.78rem;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}
.name-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--parchment2);background:var(--parchment);font-family:'Nunito',sans-serif;font-size:1rem;color:var(--dark);outline:none;}
.name-input:focus{border-color:var(--gold);}
.level-label{font-size:.78rem;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.level-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.level-card{border-radius:12px;border:1.5px solid var(--parchment2);background:white;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.level-card:active{transform:scale(.97);}
.level-card.selected{background:var(--dark2);border-color:var(--dark2);}
.level-card .lnum{font-size:1.3rem;font-weight:800;color:var(--gold);line-height:1;}
.level-card.selected .lnum{color:var(--gold-light);}
.level-card .ldesc{font-size:.72rem;color:var(--brown);margin-top:4px;line-height:1.3;}
.level-card.selected .ldesc{color:rgba(242,216,138,.8);}
.start-btn{width:100%;padding:14px;border-radius:12px;background:var(--dark2);color:var(--gold-light);border:none;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:.02em;}
.start-btn:active{transform:scale(.98);background:var(--brown);}
.start-btn:disabled{opacity:.4;cursor:default;}

/* QUIZ */
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.q-counter{font-size:.82rem;font-weight:700;color:var(--brown);}
.q-score-live{font-size:.82rem;font-weight:700;color:var(--gold);}
.progress-track{height:6px;background:var(--parchment2);border-radius:99px;overflow:hidden;margin-bottom:16px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),#E8B84B);border-radius:99px;transition:width .3s;}
.q-card{background:white;border-radius:var(--radius);padding:18px 16px;border:1px solid var(--parchment2);box-shadow:var(--shadow);margin-bottom:12px;animation:pop .2s ease;}
@keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.q-book{font-size:.74rem;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}
.q-text{font-family:'Crimson Pro',serif;font-size:1.15rem;color:var(--dark2);line-height:1.5;margin-bottom:14px;}
.multi-note{font-size:.76rem;color:var(--brown);font-style:italic;background:var(--gold-pale);border-left:2.5px solid var(--gold);padding:6px 10px;border-radius:6px;margin-bottom:10px;}
.options{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;border:1.5px solid var(--parchment2);background:var(--parchment);font-family:'Nunito',sans-serif;font-size:.92rem;color:var(--dark);cursor:pointer;font-weight:600;transition:all .15s;-webkit-user-select:none;user-select:none;}
.opt:active:not([data-done]){transform:scale(.98);}
.opt.sel{background:var(--sel-bg);border-color:var(--sel-border);color:var(--sel-text);}
.opt.done-sel{background:var(--sel-bg);border-color:var(--sel-border);color:var(--sel-text);cursor:default;}
.opt-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;opacity:.6;}
.confirm-btn{width:100%;margin-top:10px;padding:12px;border-radius:10px;background:var(--dark2);color:var(--gold-light);border:none;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;}
.confirmed-note{margin-top:8px;padding:8px 12px;border-radius:8px;background:var(--gold-pale);border-left:2.5px solid var(--gold);font-size:.84rem;color:var(--brown);font-weight:600;}

/* MATCH */
.match-note{font-size:.76rem;color:var(--brown);font-style:italic;background:var(--gold-pale);border-left:2.5px solid var(--gold);padding:6px 10px;border-radius:6px;margin-bottom:10px;}
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.match-col-head{font-size:.72rem;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.match-col{display:flex;flex-direction:column;gap:6px;}
.match-item{padding:8px 10px;border-radius:8px;border:1.5px solid var(--parchment2);background:var(--parchment);font-size:.8rem;color:var(--dark);cursor:pointer;min-height:38px;display:flex;align-items:center;font-weight:600;line-height:1.25;transition:all .15s;}
.match-item:active:not(.mmatched):not(.mlocked){transform:scale(.97);}
.match-item.msel{background:var(--sel-bg);border-color:var(--sel-border);color:var(--sel-text);}
.match-item.mmatched{background:#D6EED9;border-color:#3A7D44;color:#1B5226;cursor:default;}
.match-item.mwrong{background:#FCE8EB;border-color:#9B2335;color:#6B1020;}
.match-item.mlocked{cursor:default;opacity:.45;}

/* NAV */
.nav-row{display:flex;gap:10px;margin-top:4px;}
.nav-btn{flex:1;padding:12px;border-radius:11px;border:1.5px solid var(--parchment2);background:white;font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;color:var(--dark);transition:all .15s;}
.nav-btn:active:not(:disabled){transform:scale(.98);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.nav-btn.primary{background:var(--dark2);color:var(--gold-light);border-color:var(--dark2);flex:2;}
.nav-btn.primary:active:not(:disabled){background:var(--brown);}

/* RESULT */
.result-wrap{text-align:center;padding:32px 16px;}
.result-icon{font-size:3.5rem;margin-bottom:10px;}
.result-name{font-size:1rem;color:var(--brown);margin-bottom:4px;}
.result-score{font-family:'Crimson Pro',serif;font-size:3.2rem;font-weight:600;color:var(--dark2);line-height:1;}
.result-of{font-size:.9rem;color:var(--brown);margin-bottom:8px;}
.result-bar-wrap{background:var(--parchment2);border-radius:99px;height:10px;max-width:260px;margin:0 auto 16px;}
.result-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),#E8B84B);transition:width .6s ease;}
.result-msg{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:6px;}
.result-sub{font-size:.85rem;color:var(--brown);font-style:italic;margin-bottom:24px;max-width:300px;margin-left:auto;margin-right:auto;}
.sent-note{background:var(--green-pale);border:1px solid var(--green-ok);border-radius:10px;padding:12px 16px;font-size:.85rem;color:#1B5226;font-weight:600;margin-bottom:16px;}
.retry-btn{padding:12px 28px;border-radius:11px;background:var(--dark2);color:var(--gold-light);border:none;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;}
</style>
</head>

<!-- SCREEN 2: QUIZ -->

  <div class="nav-row">

    <button class="nav-btn primary" id="next-btn" onclick="navigate(1)">Далі →</button>
  </div>
</div>

<!-- SCREEN 3: RESULT -->
<div class="screen" id="screen-result">
  <div class="result-wrap">
    <div class="result-icon" id="r-icon">🏆</div>
    <div class="result-name" id="r-name"></div>
    <div class="result-score" id="r-score"></div>
    <div class="result-of" id="r-of"></div>
    <div class="result-bar-wrap"><div class="result-bar" id="r-bar" style="width:0%"></div></div>
    <div class="result-msg" id="r-msg"></div>
    <div class="result-sub">Правильні відповіді покаже вчитель на занятті</div>
    <div class="sent-note" id="sent-note" style="display:none">
      ✅ Результат надіслано вчителю
    </div>
    <button class="retry-btn" onclick="goWelcome()">Спробувати ще раз</button>
  </div>
</div>

    {q:"Які події відбулися в день П'ятидесятниці?",opts:["Зійшов Дух Святий","Люди говорили різними мовами","Петро проповідував","Охрестилось 3000 осіб"],c:[0,1,2,3],book:"Дії 2",multi:true},
    {q:"Яких суддів описує Книга Суддів?",opts:["Девора","Самсон","Соломон","Ґедеон","Давид"],c:[0,1,3],book:"Книга Суддів",multi:true},
    {q:"Які чуда здійснив Єлисей?",opts:["Очистив воду в Єрихоні","Воскресив дитину","Перетворив воду на вино","Нагодував 100 осіб 20 хлібами"],c:[0,1,3],book:"4 Царів 2–4",multi:true},
    {q:"Що сталося з Йосифом до правителя Єгипту?",opts:["Брати кинули його в яму","Його продали до Єгипту","Його несправедливо кинули до в'язниці","Він навчився чаклунства"],c:[0,1,2],book:"Буття 37–39",multi:true},
    {q:"Які слова вимовив Ісус на хресті?",opts:["Боже мій, чому Ти мене покинув?","Жадаю!","Сьогодні будеш зі Мною в раю","Іди за Мною"],c:[0,1,2],book:"Матвій 27; Лука 23; Іван 19",multi:true},
    {q:"Що сказав Ісус Петру біля Тиверіадського моря?",opts:["Ловіть рибу праворуч","Пасіть вівці Мої","Ідіть у цілий світ","Хрестіть у воді"],c:[0,1],book:"Іван 21",multi:true},
    {type:"match",q:"Зіставте книгу з її головним героєм:",book:"Різні книги",pairs:[["Книга Рут","Рут і Наомі"],["Книга Єстер","Єстер і Мардохей"],["Книга Йова","Йов та його друзі"],["Книга Даниїла","Даниїл і троє юнаків"]]},
    {type:"match",q:"Зіставте подію з книгою Біблії:",book:"Різні книги",pairs:[["Перехід через Червоне море","Вихід"],["Падіння мурів Єрихону","Ісус Навин"],["Воскресіння Лазаря","Євангеліє від Івана"],["П'ятидесятниця","Дії апостолів"]]},
    {type:"match",q:"Зіставте пророка з його ознакою:",book:"Пророчі книги",pairs:[["Ілля","Взятий на небо у вихорі"],["Єлисей","Отримав подвійну частку духу Іллі"],["Йона","Пробув у череві риби 3 дні"],["Даниїл","Не схилявся перед ідолом"]]},
    {type:"match",q:"Зіставте царя з його вчинком:",book:"Книги Царів",pairs:[["Соломон","Побудував храм у Єрусалимі"],["Давид","Убив Голіафа каменем із пращі"],["Саул","Перший цар Ізраїлю"],["Ахав","Запровадив поклоніння Ваалу"]]},
    {type:"match",q:"Зіставте персонажа з вчинком:",book:"Новий Завіт",pairs:[["Закхей","Виліз на смоковницю побачити Ісуса"],["Никодим","Прийшов до Ісуса вночі"],["Марфа","Турбувалась про приготування їжі"],["Марія Магдалина","Помазала ноги Ісуса миром"]]}
  ]
};

// ─── СТАН ────────────────────────────────────────────────────
let studentName='', chosenLevel=1, curQ=0, answers={}, ms={};
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if(tg){tg.ready();tg.expand();}

// ─── WELCOME ─────────────────────────────────────────────────
function pickLevel(l){
  chosenLevel=l;
  document.querySelectorAll('.level-card').forEach(c=>c.classList.toggle('selected',+c.dataset.level===l));
}
function startQuiz(){
  const n=document.getElementById('inp-name').value.trim();
  if(!n){document.getElementById('inp-name').focus();document.getElementById('inp-name').style.borderColor='#9B2335';setTimeout(()=>document.getElementById('inp-name').style.borderColor='',1500);return;}
  studentName=n;curQ=0;answers={};ms={};
  show('screen-quiz');render();
}
function goWelcome(){show('screen-welcome');}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));}

// ─── РЕНДЕР ──────────────────────────────────────────────────
function render(){
  const qs=L[chosenLevel],q=qs[curQ];
  const pct=Math.round(((curQ+1)/qs.length)*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('q-counter').textContent=(curQ+1)+' / '+qs.length;
  document.getElementById('q-score-live').textContent='✓ '+countCorrect();
  const area=document.getElementById('q-area');
  if(q.type==='match') renderMatch(q,area);
  else if(q.multi) renderMulti(q,area);
  else renderSingle(q,area);
  document.getElementById('prev-btn').disabled=curQ===0;
  document.getElementById('next-btn').textContent=curQ===qs.length-1?'Завершити ✓':'Далі →';
}

function renderSingle(q,area){
  const a=answers[curQ],done=a!==undefined;
  let h=`<div class="q-card"><div class="q-book">${q.book}</div><div class="q-text">${q.q}</div><div class="options">`;
  q.opts.forEach((o,i)=>{
    const sel=done&&a===i;
    h+=`<div class="opt ${sel?'done-sel':''}" onclick="${done?'':'ansSingle('+i+')'}">`+
       `<span class="opt-dot">${sel?'●':''}</span>${o}</div>`;
  });
  h+='</div>';
  if(done) h+=`<div class="confirmed-note">✓ Відповідь збережена</div>`;
  h+='</div>';area.innerHTML=h;
}

function renderMulti(q,area){
  const a=answers[curQ],done=a!==undefined;
  if(!ms.sel) ms.sel=[];
  let h=`<div class="q-card"><div class="q-book">${q.book}</div><div class="q-text">${q.q}</div>`+
    `<div class="multi-note">Оберіть усі правильні варіанти</div><div class="options">`;
  q.opts.forEach((o,i)=>{
    const sel=done?a.includes(i):ms.sel.includes(i);
    h+=`<div class="opt ${sel?(done?'done-sel':'sel'):''}" onclick="${done?'':'togMulti('+i+')'}">`+
       `<span class="opt-dot">${sel?'●':''}</span>${o}</div>`;
  });
  h+='</div>';
  if(!done) h+=`<button class="confirm-btn" onclick="submitMulti()">Підтвердити →</button>`;
  if(done)  h+=`<div class="confirmed-note">✓ Відповідь збережена</div>`;
  h+='</div>';area.innerHTML=h;
}

function renderMatch(q,area){
  const a=answers[curQ],done=a!==undefined;
  if(!ms[curQ]) ms[curQ]={sel:null,matched:[],wrongs:[],order:null};
  const m=ms[curQ],pairs=q.pairs;
  if(!m.order){
    m.order=pairs.map((_,i)=>i);
    for(let i=m.order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[m.order[i],m.order[j]]=[m.order[j],m.order[i]];}
  }
  let h=`<div class="q-card"><div class="q-book">${q.book}</div><div class="q-text">${q.q}</div>`+
    `<div class="match-note">Торкніться ліворуч, потім праворуч</div>`+
    `<div class="match-wrap"><div class="match-col"><div class="match-col-head">Поняття</div>`;
  pairs.forEach((_,i)=>{
    let cls='';
    if(done||m.matched.includes(i))cls='mmatched';
    else if(m.sel===i)cls='msel';
    else if(m.wrongs.some(w=>w[0]===i))cls='mwrong';
    h+=`<div class="match-item ${cls}" onclick="matchL(${i})">${pairs[i][0]}</div>`;
  });
  h+=`</div><div class="match-col"><div class="match-col-head">Відповідь</div>`;
  (done?pairs.map((_,i)=>i):m.order).forEach(ri=>{
    let cls='';
    if(done||m.matched.includes(ri))cls='mmatched';
    else if(m.wrongs.some(w=>w[1]===ri))cls='mwrong';
    h+=`<div class="match-item ${cls}" onclick="matchR(${ri})">${pairs[ri][1]}</div>`;
  });
  h+='</div></div>';
  if(!done&&m.matched.length===pairs.length){answers[curQ]=true;h+=`<div class="confirmed-note">✓ Усі пари зіставлено!</div>`;}
  if(done) h+=`<div class="confirmed-note">✓ Відповідь збережена</div>`;
  h+='</div>';area.innerHTML=h;
}

// ─── ДІЇ ─────────────────────────────────────────────────────
function ansSingle(i){answers[curQ]=i;render();}
function togMulti(i){if(!ms.sel)ms.sel=[];const idx=ms.sel.indexOf(i);if(idx===-1)ms.sel.push(i);else ms.sel.splice(idx,1);render();}
function submitMulti(){answers[curQ]=ms.sel?[...ms.sel]:[];ms.sel=[];render();}
function matchL(i){if(answers[curQ]!==undefined)return;const m=ms[curQ];if(!m||m.matched.includes(i))return;m.sel=i;render();}
function matchR(ri){
  if(answers[curQ]!==undefined)return;
  const m=ms[curQ];if(!m||m.sel===null||m.matched.includes(ri))return;
  if(m.sel===ri){m.matched.push(ri);m.sel=null;if(m.matched.length===L[chosenLevel][curQ].pairs.length)answers[curQ]=true;}
  else{m.wrongs.push([m.sel,ri]);m.sel=null;setTimeout(()=>{if(m.wrongs.length)m.wrongs.shift();render();},650);}
  render();
}

function navigate(dir){
  ms.sel=[];
  const qs=L[chosenLevel];
  if(dir===1&&curQ===qs.length-1){showResult();return;}
  curQ=Math.max(0,Math.min(qs.length-1,curQ+dir));render();
}

// ─── ПІДРАХУНОК ──────────────────────────────────────────────
function countCorrect(){
  const qs=L[chosenLevel];let n=0;
  qs.forEach((q,i)=>{
    const a=answers[i];if(a===undefined)return;
    if(q.type==='match'){if(a===true)n++;}
    else if(q.multi){if(JSON.stringify([...a].sort())==JSON.stringify([...q.c].sort()))n++;}
    else{if(a===q.c)n++;}
  });
  return n;
}

// ─── РЕЗУЛЬТАТ ───────────────────────────────────────────────
function showResult(){
  const total=L[chosenLevel].length,correct=countCorrect();
  const pct=Math.round((correct/total)*100);
  let icon='📖',msg='Не здавайся, повторюй далі!';
  if(pct>=90){icon='🏆';msg='Відмінно! Ти справжній знавець Слова!';}
  else if(pct>=70){icon='⭐';msg='Дуже добре! Продовжуй вивчати Біблію!';}
  else if(pct>=50){icon='👍';msg='Непогано! Ще трохи — і буде чудово!';}
  document.getElementById('r-icon').textContent=icon;
  document.getElementById('r-name').textContent=studentName;
  document.getElementById('r-score').textContent=correct;
  document.getElementById('r-of').textContent='правильних з '+total;
  document.getElementById('r-bar').style.width=pct+'%';
  document.getElementById('r-msg').textContent=msg;
  show('screen-result');
  sendToTeacher(correct,total,pct);
}

// ─── ВІДПРАВКА ВЧИТЕЛЮ ───────────────────────────────────────
async function sendToTeacher(correct,total,pct){
  if(!BOT_TOKEN||BOT_TOKEN==='ВСТАВТЕ_ТОКЕН_БОТА')return;
  if(!TEACHER_CHAT_ID||TEACHER_CHAT_ID==='ВСТАВТЕ_ВАШ_CHAT_ID')return;
  const tgUser=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user;
  const tgUsername=tgUser?(tgUser.username?'@'+tgUser.username:'TG: '+tgUser.first_name):'—';
  const now=new Date().toLocaleString('uk-UA',{timeZone:'Europe/Kyiv'});
  const stars=pct>=90?'🌟🌟🌟':pct>=70?'🌟🌟':pct>=50?'🌟':'';
  const text=
    `📋 *Результат тесту*\n`+
    `👤 Учень: *${studentName}*\n`+
    `📱 Telegram: ${tgUsername}\n`+
    `📚 Рівень: *${chosenLevel}*\n`+
    `✅ Результат: *${correct} / ${total}* (${pct}%) ${stars}\n`+
    `🕐 Час: ${now}`;
  try{
    const r=await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:TEACHER_CHAT_ID,text,parse_mode:'Markdown'})
    });
    if(r.ok) document.getElementById('sent-note').style.display='block';
  }catch(e){console.error('Send error:',e);}
}
</script>
